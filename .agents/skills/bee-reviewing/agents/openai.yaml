interface:
  display_name: "Bee Reviewing"
  short_description: "Run the multi-agent review gate — severity findings, artifact verification, and user acceptance — over an immutable scope the user explicitly asked to review. Use only when the user requests an independent review: \"review this\", \"review today's work\", \"review feature A and B\", \"review the diff from X to Y\", \"review everything unreviewed before release\". A finished cell, slice, or feature is never a trigger by itself, and neither is \"merge\"/\"ship\"/\"release\" alone."
policy:
  allow_implicit_invocation: true
